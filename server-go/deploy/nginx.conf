upstream git_ai_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate-limit bucket for password login + device-code initiation.
# 10 requests per minute per client IP, bursts of 5 allowed.
limit_req_zone $binary_remote_addr zone=gitai_auth:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name git-ai.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name git-ai.example.com;

    ssl_certificate     /etc/letsencrypt/live/git-ai.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/git-ai.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    client_max_body_size 10m;

    access_log /var/log/nginx/git-ai.access.log;
    error_log  /var/log/nginx/git-ai.error.log warn;

    # SPA static root
    root /var/www/git-ai/dist;
    index index.html;

    # Rate-limit brute-forceable auth endpoints.
    location = /api/user/login {
        limit_req zone=gitai_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_http_version 1.1;
        proxy_pass http://git_ai_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location ~ ^/workers?/oauth/device/code$ {
        limit_req zone=gitai_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_http_version 1.1;
        proxy_pass http://git_ai_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    # JSON API → Go
    location /api/ {
        proxy_http_version 1.1;
        proxy_pass http://git_ai_backend;
        # include /etc/nginx/snippets/git-ai-proxy.conf;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # CLI / worker compatibility → Go
    location /workers/ { proxy_pass http://git_ai_backend; include /etc/nginx/snippets/git-ai-proxy.conf; }
    location /worker/  { proxy_pass http://git_ai_backend; include /etc/nginx/snippets/git-ai-proxy.conf; }
    location /releases { proxy_pass http://git_ai_backend; include /etc/nginx/snippets/git-ai-proxy.conf; }

    # Vite hash-named assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for any path that doesn't match a file
    location / {
        try_files $uri /index.html;
    }

    location = /health {
        proxy_http_version 1.1;
        proxy_pass http://git_ai_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }
}
