<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Git AI - Login</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --panel: #ffffff;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #0f766e;
        --accent-hover: #0d5a52;
        --danger: #be123c;
        --danger-soft: #fff1f2;
        --panel-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        background-image:
          radial-gradient(at 0% 0%, rgba(15, 118, 110, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(15, 118, 110, 0.05) 0px, transparent 50%);
        color: var(--text);
        line-height: 1.5;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: var(--panel-shadow);
        width: 100%;
        max-width: 420px;
        margin: 20px;
      }
      .logo {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, var(--accent), #2dd4bf);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        box-shadow: 0 8px 16px rgba(15, 118, 110, 0.2);
      }
      h1 { font-size: 1.5rem; font-weight: 800; margin: 0 0 8px; text-align: center; }
      .subtitle { color: var(--muted); font-size: 0.9375rem; text-align: center; margin: 0 0 32px; }
      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text);
      }
      input[type="text"], input[type="password"] {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 0.9375rem;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 20px;
        font-family: inherit;
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
      }
      button {
        width: 100%;
        padding: 12px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .error-msg {
        background: var(--danger-soft);
        color: var(--danger);
        border: 1px solid #fee2e2;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 20px;
        display: none;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0;
        color: var(--muted);
        font-size: 0.8125rem;
      }
      .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .cli-hint {
        text-align: center;
        color: var(--muted);
        font-size: 0.8125rem;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 0.8125rem;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65S8.93 17.38 9 18v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
      </div>
      <h1>Sign in to Git AI</h1>
      <p class="subtitle">Enter your credentials to access the dashboard</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />

        <button type="submit" id="submitBtn">Sign in</button>
      </form>

      <div class="divider">or</div>
      <p class="cli-hint">Use <code>git-ai login</code> to authenticate via CLI</p>
    </div>

    <script>
      async function handleLogin(e) {
        e.preventDefault();
        var btn = document.getElementById('submitBtn');
        var errEl = document.getElementById('errorMsg');
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
          var res = await fetch('/api/user/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: document.getElementById('username').value.trim(),
              password: document.getElementById('password').value
            }),
            credentials: 'same-origin'
          });
          var data = await res.json();
          if (data.success) {
            window.location.href = '/me';
          } else {
            errEl.textContent = data.message || 'Login failed';
            errEl.style.display = 'block';
          }
        } catch (err) {
          errEl.textContent = 'Network error. Please try again.';
          errEl.style.display = 'block';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      }
    </script>
  </body>
</html>
